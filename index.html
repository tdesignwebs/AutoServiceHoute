<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoServiceHoute</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      scroll-behavior: smooth;
    }

    .container {
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    .section {
      width: 100%;
      height: 100vh;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-family: sans-serif;
      color: white;
    }

    .section:nth-child(1) { background: #30302E; }
    .section:nth-child(2) { background: #5B5952; }
    .section:nth-child(3) { background: #404040; }
    .section:nth-child(4) { background: #666666; }
    .section:nth-child(5) { background: #999999; }

    /* Navbar styling (optional fix) */
    .navbar{
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            width: 95%;
            height: 100px;
        }
        .logo{
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-items{
            width: fit-content;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        .item{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        h1{
            font-family: sans-serif;
            color: white;
            margin: 0;
            font-size: 17px;
            font-weight: 300;
        }
        h2{
            font-family: sans-serif;
            color: rgb(0, 0, 0);
            font-size: 16px;
            margin: 0;
            font-weight: 600;
        }
        .book-button{
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.167);
            border-radius: 500px;
        }
        .book-box{
            display: flex;
            align-items: center;
            justify-content: end;
            width: 100px;
            height: fit-content;
        }
  </style>
</head>
